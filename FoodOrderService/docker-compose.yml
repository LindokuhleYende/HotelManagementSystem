version: '3.8'
services:
  food-order-db:
    image: postgres:15-alpine
    container_name: food-order-postgres
    environment:
      POSTGRES_USER: food_admin
      POSTGRES_PASSWORD: order_secret_pass
      POSTGRES_DB: food_order_db
    ports:
      - "5433:5432"
    volumes:
      - pg_food_data:/var/lib/postgresql/data

volumes:
  pg_food_data:
