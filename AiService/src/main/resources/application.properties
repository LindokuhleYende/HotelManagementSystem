# 1. Identity & Network Ports
spring.application.name=AiService
server.port=8082


# 2. Tell Spring NOT to look for local SQL/H2 database parameters for this module
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# 3. Connection path back to your central service-registry
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# 4. Spring AI Core Properties (Reads your key securely from your OS)
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
