version: '3.8'

services:
  # PostgreSQL Databases
  postgres-auth:
    image: postgres:14
    environment:
      POSTGRES_DB: hotel_auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data

  postgres-booking:
    image: postgres:14
    environment:
      POSTGRES_DB: hotel_booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-booking-data:/var/lib/postgresql/data

  postgres-food:
    image: postgres:14
    environment:
      POSTGRES_DB: hotel_food_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-food-data:/var/lib/postgresql/data

  # Service Registry
  service-registry:
    build: ./service-registry
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  # Auth Service
  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres-auth
      - service-registry
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-auth:5432/hotel_auth_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/

  # Room Booking Service
  room-booking-service:
    build: ./room-booking-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres-booking
      - service-registry
      - auth-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-booking:5432/hotel_booking_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/

  # Food Order Service
  food-order-service:
    build: ./food-order-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres-food
      - service-registry
      - auth-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-food:5432/hotel_food_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/

volumes:
  postgres-auth-data:
  postgres-booking-data:
  postgres-food-data: